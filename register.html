{% extends "base.html" %}
{% block title %}Register | VisioGuard{% endblock %}
{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">Create operator account</p>
        <h1>Set up VisioGuard access</h1>
        <p class="muted">Registration creates a local account stored in SQLite with a hashed password.</p>
    </div>
    <form method="post" class="form-card">
        <label>
            Name
            <input type="text" name="name" autocomplete="name" required>
        </label>
        <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
            Password
            <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <button type="submit">Create account</button>
        <p class="form-note">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</section>
{% endblock %}
